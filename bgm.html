<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeloGen – BGM生成</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080a12;
    color: #f0ede8;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 24px;
  }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
  h1 span { color: #e8c547; }
  .card {
    background: #0f1220;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px;
    width: min(480px, 100%);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  label { font-size: 13px; color: #7c8599; font-weight: 500; }
  input, textarea, select {
    background: #080a12;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #f0ede8;
    font-size: 15px;
    padding: 12px 14px;
    width: 100%;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: #e8c547;
  }
  textarea { resize: none; height: 80px; }
  select option { background: #0f1220; }
  .tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .tag {
    background: rgba(232,197,71,0.1);
    border: 1px solid rgba(232,197,71,0.2);
    color: #e8c547;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .tag:hover, .tag.active {
    background: rgba(232,197,71,0.25);
    border-color: #e8c547;
  }
  .btn {
    background: linear-gradient(135deg, #e8c547, #f5d96a);
    color: #080a12;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,197,71,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status {
    text-align: center;
    font-size: 14px;
    color: #7c8599;
    min-height: 20px;
  }
  .status.loading { color: #e8c547; }
  .status.error { color: #f87171; }
  .status.success { color: #4ade80; }
  .result {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .result.visible { display: flex; }
  audio {
    width: 100%;
    border-radius: 8px;
    accent-color: #e8c547;
  }
  .dl-btn {
    background: transparent;
    border: 1px solid #e8c547;
    color: #e8c547;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: all .2s;
  }
  .dl-btn:hover { background: rgba(232,197,71,0.1); }
  .api-section {
    display: flex; flex-direction: column; gap: 6px;
  }
  .waveform {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 2px;
    justify-content: center;
  }
  .wv-bar {
    width: 4px;
    border-radius: 2px;
    background: #e8c547;
    animation: wvPulse 1.2s ease-in-out infinite;
  }
  @keyframes wvPulse {
    0%,100% { transform: scaleY(.3); opacity:.5; }
    50% { transform: scaleY(1); opacity:1; }
  }
  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .progress-bar.visible { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e8c547, #f5d96a);
    border-radius: 2px;
    width: 0%;
    transition: width .5s;
  }
</style>
</head>
<body>

<h1>Melo<span>Gen</span></h1>

<div class="card">
  <!-- API Key -->
  <div class="api-section">
    <label>Hugging Face APIキー</label>
    <input type="password" id="apiKey" placeholder="hf_xxxxxxxxxxxxxxxxxxxx">
  </div>

  <!-- Prompt -->
  <div>
    <label>どんなBGMを作りますか？</label>
    <textarea id="prompt" placeholder="例：穏やかなピアノ、夜、切ない雰囲気"></textarea>
  </div>

  <!-- Tags -->
  <div>
    <label style="margin-bottom:8px;display:block;">ジャンル・雰囲気</label>
    <div class="tags" id="tags">
      <span class="tag" data-val="piano">ピアノ</span>
      <span class="tag" data-val="lofi">ローファイ</span>
      <span class="tag" data-val="orchestral">オーケストラ</span>
      <span class="tag" data-val="ambient">アンビエント</span>
      <span class="tag" data-val="upbeat">アップビート</span>
      <span class="tag" data-val="sad">切ない</span>
      <span class="tag" data-val="peaceful">穏やか</span>
      <span class="tag" data-val="epic">エピック</span>
    </div>
  </div>

  <!-- Duration -->
  <div>
    <label>長さ: <span id="durLabel">15秒</span></label>
    <input type="range" id="duration" min="5" max="30" value="15" style="padding:0;border:none;background:transparent;accent-color:#e8c547;">
  </div>

  <!-- Generate -->
  <button class="btn" id="genBtn" onclick="generate()">
    🎵 BGMを生成する
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <p class="status" id="status"></p>

  <!-- Result -->
  <div class="result" id="result">
    <div class="waveform" id="waveform"></div>
    <audio id="player" controls></audio>
    <button class="dl-btn" onclick="download()">⬇ MP3をダウンロード</button>
  </div>
</div>

<script>
  // Tags
  document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      tag.classList.toggle('active');
      updatePromptTags();
    });
  });

  function updatePromptTags() {
    const active = [...document.querySelectorAll('.tag.active')].map(t => t.dataset.val);
    const base = document.getElementById('prompt').value.replace(/\[.*?\]/g, '').trim();
    if (active.length) {
      document.getElementById('prompt').value = base + (base ? ' ' : '') + '[' + active.join(', ') + ']';
    } else {
      document.getElementById('prompt').value = base;
    }
  }

  // Duration label
  document.getElementById('duration').addEventListener('input', e => {
    document.getElementById('durLabel').textContent = e.target.value + '秒';
  });

  // Waveform decoration
  const wf = document.getElementById('waveform');
  for (let i = 0; i < 24; i++) {
    const b = document.createElement('div');
    b.className = 'wv-bar';
    const h = 8 + Math.random() * 32;
    b.style.height = h + 'px';
    b.style.animationDelay = (i * 0.08) + 's';
    wf.appendChild(b);
  }

  let audioBlob = null;

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const prompt = document.getElementById('prompt').value.trim();
    const duration = parseInt(document.getElementById('duration').value);

    if (!apiKey) { setStatus('APIキーを入力してください', 'error'); return; }
    if (!prompt) { setStatus('BGMの説明を入力してください', 'error'); return; }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    document.getElementById('result').classList.remove('visible');
    document.getElementById('progressBar').classList.add('visible');
    setStatus('🎵 生成中... 20〜60秒かかります', 'loading');

    // Progress animation
    let pct = 0;
    const pInterval = setInterval(() => {
      pct = Math.min(pct + Math.random() * 3, 90);
      document.getElementById('progressFill').style.width = pct + '%';
    }, 800);

    try {
      const fullPrompt = prompt + `, duration: ${duration} seconds, high quality, instrumental music`;

      const response = await fetch(
        'https://api-inference.huggingface.co/models/facebook/musicgen-small',
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            inputs: fullPrompt,
            parameters: { max_new_tokens: duration * 50 }
          })
        }
      );

      clearInterval(pInterval);

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        if (response.status === 503) {
          setStatus('モデルを起動中です。30秒後にもう一度試してください', 'error');
        } else if (response.status === 401) {
          setStatus('APIキーが正しくありません', 'error');
        } else {
          setStatus('エラー: ' + (err.error || response.status), 'error');
        }
        btn.disabled = false;
        document.getElementById('progressFill').style.width = '0%';
        return;
      }

      audioBlob = await response.blob();
      const url = URL.createObjectURL(audioBlob);
      document.getElementById('player').src = url;
      document.getElementById('progressFill').style.width = '100%';

      setTimeout(() => {
        document.getElementById('progressBar').classList.remove('visible');
        document.getElementById('progressFill').style.width = '0%';
      }, 500);

      document.getElementById('result').classList.add('visible');
      setStatus('✅ 生成完了！', 'success');

    } catch (e) {
      clearInterval(pInterval);
      setStatus('通信エラー: ' + e.message, 'error');
    }

    btn.disabled = false;
  }

  function download() {
    if (!audioBlob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(audioBlob);
    a.download = 'melogen-bgm.wav';
    a.click();
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }
</script>
</body>
</html>
